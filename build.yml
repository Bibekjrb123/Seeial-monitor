name: Build ArduinoScope APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # ← This lets you trigger manually with one click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3 - Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # Step 4 - Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Step 5 - Build APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # Step 6 - Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ArduinoScope-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
